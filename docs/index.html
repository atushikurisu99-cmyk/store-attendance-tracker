<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="screen-orientation" content="landscape" />
<meta name="theme-color" content="#0A0D12" />
<link rel="manifest" href="manifest.json" />
<title>店舗出勤状況トラッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0A0D12;
    --panel: #11151C;
    --panel-2: #161B24;
    --hairline: #1F2530;
    --text: #ECEEF2;
    --muted: #7B8492;
    --muted-dim: #545C68;
    --up: #57B788;
    --down: #E0707A;
    --accent: #E3A857;
    --accent-dim: rgba(227, 168, 87, 0.16);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    position: fixed;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
  }
  .num {
    font-family: "SF Mono", "Menlo", ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
  }

  /* 縦持ちの端末では横向きへの回転を促す。CSSでの強制回転(transform)は
     ブラウザやWebViewによって挙動が不安定なため採用しない。 */
  @media (orientation: portrait) {
    #rotate-hint { display: flex; }
    #app { display: none; }
  }
  #rotate-hint {
    display: none;
    height: 100vh;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 20px;
    line-height: 1.6;
  }
  #rotate-hint .glyph { font-size: 40px; display: block; margin-bottom: 12px; }

  #app { display: flex; height: 100vh; }

  /* --- 通知欄: 詳細パネル右上に相対配置、LINE風に積み上がる --- */
  #notification-stack {
    position: absolute;
    top: 14px;
    right: 14px;
    left: 14px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    pointer-events: none;
  }
  .notification-card {
    background: var(--panel-2);
    border: 1px solid var(--hairline);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 15px;
    max-width: 340px;
    width: 100%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    animation: slideIn 0.25s ease-out;
    pointer-events: auto;
  }
  .notification-card .n-title { font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
  .notification-card .n-body { color: var(--muted); font-size: 13.5px; }
  @keyframes slideIn {
    from { transform: translateY(-8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* --- 左: 一覧パネル --- */
  #list-panel {
    width: 372px;
    flex-shrink: 0;
    border-right: 1px solid var(--hairline);
    overflow-y: auto;
    background: var(--panel);
    padding-left: env(safe-area-inset-left);
  }
  header {
    padding: 20px 22px 14px;
    padding-left: max(22px, env(safe-area-inset-left));
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(227,168,87,0.6);
    animation: pulse 2.2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(227,168,87,0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(227,168,87,0); }
    100% { box-shadow: 0 0 0 0 rgba(227,168,87,0); }
  }
  h1 { font-size: 14px; margin: 0; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

  .store-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 22px;
    border-bottom: 1px solid var(--hairline);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .store-row:hover { background: var(--panel-2); }
  .store-row.active { background: var(--accent-dim); border-left: 3px solid var(--accent); padding-left: 19px; }

  .store-row-main { min-width: 0; flex: 1; }
  .store-name {
    font-size: 15.5px;
    line-height: 1.35;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .edit-name-btn {
    display: inline-block;
    margin-left: 6px;
    opacity: 0.5;
    cursor: pointer;
    font-size: 13px;
  }
  .edit-name-btn:hover { opacity: 1; }
  .sparkline { display: block; margin-top: 6px; }

  .store-row-stat { text-align: right; flex-shrink: 0; }
  .store-count { font-size: 26px; font-weight: 700; }
  .store-count .unit { font-size: 14px; font-weight: 500; color: var(--muted); margin-left: 1px; }
  .diff { font-size: 14px; display: block; margin-top: 2px; }
  .diff.up { color: var(--up); }
  .diff.down { color: var(--down); }
  .diff.flat { color: var(--muted-dim); }

  /* --- 右: 詳細パネル --- */
  #detail-panel {
    flex: 1;
    position: relative;
    padding: 28px 36px;
    overflow-y: auto;
  }
  .detail-eyebrow {
    font-size: 12.5px;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
  }
  #detail-title { font-size: 23px; color: var(--text); margin-bottom: 2px; font-weight: 700; }
  #detail-sub { font-size: 14.5px; color: var(--muted); margin-bottom: 22px; }

  .hero-stats { display: flex; gap: 28px; margin-bottom: 26px; }
  .hero-stat { }
  .hero-stat .label { font-size: 12.5px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.02em; }
  .hero-stat .value { font-size: 34px; font-weight: 700; }
  .hero-stat .value .unit { font-size: 16px; color: var(--muted); font-weight: 500; margin-left: 2px; }

  #chart-wrap { max-width: 900px; background: var(--panel); border: 1px solid var(--hairline); border-radius: 14px; padding: 20px 22px 8px; }
  .chart-caption { font-size: 12.5px; color: var(--muted-dim); margin-top: 8px; }
  .empty-state { color: var(--muted); font-size: 16px; padding: 20px 22px; }
</style>
</head>
<body>

<div id="rotate-hint">
  <span class="glyph">📱</span>
  画面を横向きにしてご覧ください
</div>

<div id="app">
  <div id="list-panel">
    <header>
      <span class="pulse-dot"></span>
      <h1>本日の出勤状況</h1>
    </header>
    <div id="store-list"></div>
  </div>
  <div id="detail-panel">
    <div id="notification-stack"></div>
    <div class="detail-eyebrow">STORE DETAIL</div>
    <div id="detail-title">店舗を選択してください</div>
    <div id="detail-sub"></div>
    <div id="hero-stats" class="hero-stats"></div>
    <div id="chart-wrap">
      <canvas id="storeChart" height="110"></canvas>
    </div>
    <div class="chart-caption">曜日別・直近4週間の重ね表示(色が濃いほど直近)</div>
  </div>
</div>

<script>
const DATA_LATEST_URL = "data/latest.json";
const DATA_HISTORY_URL = "data/history.json";

let historyData = {};
let latestData = {};
let chartInstance = null;

async function loadJSON(url) {
  try {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) return null;
    return await res.json();
  } catch (e) {
    console.error("failed to load", url, e);
    return null;
  }
}

function diffLabel(slug) {
  // 前日比は「23時実行時点」の記録同士で比較する。
  const rows = (historyData[slug] || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  if (rows.length < 2) return { text: "―", cls: "flat" };
  const todayVal = rows[rows.length - 1].attendance;
  const prevVal = rows[rows.length - 2].attendance;
  if (todayVal == null || prevVal == null) return { text: "―", cls: "flat" };
  const d = todayVal - prevVal;
  if (d > 0) return { text: `▲${d}`, cls: "up" };
  if (d < 0) return { text: `▼${Math.abs(d)}`, cls: "down" };
  return { text: "±0", cls: "flat" };
}

// LINE風の通知欄: 新人急増・新店舗追加を積み上げて表示
function pushNotification(title, body) {
  const stack = document.getElementById("notification-stack");
  const card = document.createElement("div");
  card.className = "notification-card";
  card.innerHTML = `<div class="n-title">🔔 ${title}</div><div class="n-body">${body}</div>`;
  stack.prepend(card);
}

function checkNotifications() {
  Object.entries(latestData).forEach(([slug, info]) => {
    if (info.newface != null && info.newface >= 3) {
      pushNotification(getDisplayName(slug, info.name), `新人急増を検知(直近7日で${info.newface}人)`);
    }
  });
  // 新店舗追加通知は、全店舗パトロール機能の実装後に接続する想定(未実装)。
}

function getDisplayName(slug, fallbackName) {
  try {
    const overrides = JSON.parse(localStorage.getItem("storeNameOverrides") || "{}");
    return overrides[slug] || fallbackName;
  } catch (e) {
    return fallbackName;
  }
}

function editStoreName(slug) {
  const current = getDisplayName(slug, latestData[slug]?.name || "");
  const next = window.prompt("表示名を編集", current);
  if (next === null || next.trim() === "") return;
  try {
    const overrides = JSON.parse(localStorage.getItem("storeNameOverrides") || "{}");
    overrides[slug] = next.trim();
    localStorage.setItem("storeNameOverrides", JSON.stringify(overrides));
  } catch (e) {
    console.error("failed to save name override", e);
  }
  renderList();
  selectStore(slug);
}

function renderList() {
  const listEl = document.getElementById("store-list");
  listEl.innerHTML = "";
  Object.entries(latestData).forEach(([slug, info]) => {
    const row = document.createElement("div");
    row.className = "store-row";
    row.dataset.slug = slug;
    const d = diffLabel(slug);
    const displayName = getDisplayName(slug, info.name);
    row.innerHTML = `
      <div class="store-row-main">
        <span class="store-name">${displayName}</span><span class="edit-name-btn" data-slug="${slug}">✏️</span>
      </div>
      <div class="store-row-stat">
        <span class="store-count num">${info.attendance ?? "―"}<span class="unit">人</span></span>
        <span class="diff num ${d.cls}">${d.text}</span>
      </div>
    `;
    row.addEventListener("click", (e) => {
      if (e.target.classList.contains("edit-name-btn")) return;
      selectStore(slug);
    });
    row.querySelector(".edit-name-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      editStoreName(slug);
    });
    listEl.appendChild(row);
  });
}

// 直近4週間分を「週×曜日」に整形して、週ごとに色分けした折れ線データセットを作る
function buildWeeklyOverlayDatasets(slug) {
  const rows = (historyData[slug] || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  const weekdayLabels = ["月", "火", "水", "木", "金", "土", "日"];

  const now = new Date();
  const weeks = [[], [], [], []]; // weeks[0] = 今週 ... weeks[3] = 3週間前
  rows.forEach(r => {
    const d = new Date(r.date);
    const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
    const weekIndex = Math.floor(diffDays / 7);
    if (weekIndex >= 0 && weekIndex < 4) {
      const jsWeekday = (d.getDay() + 6) % 7;
      weeks[weekIndex][jsWeekday] = r.attendance;
    }
  });

  const shades = ["#E3A857", "#E3A857b0", "#E3A85775", "#E3A85740"]; // 今週が最も濃い琥珀色
  const labels = ["今週", "先週", "2週間前", "3週間前"];

  const datasets = weeks.map((weekData, i) => ({
    label: labels[i],
    data: weekdayLabels.map((_, wd) => weekData[wd] ?? null),
    borderColor: shades[i],
    backgroundColor: shades[i],
    pointBackgroundColor: shades[i],
    spanGaps: true,
    tension: 0.35,
    borderWidth: i === 0 ? 3 : 2,
  }));

  return { labels: weekdayLabels, datasets };
}

function selectStore(slug) {
  document.querySelectorAll(".store-row.active").forEach(el => el.classList.remove("active"));
  const target = document.querySelector(`.store-row[data-slug="${slug}"]`);
  if (target) target.classList.add("active");

  const info = latestData[slug];
  document.getElementById("detail-title").textContent = info ? getDisplayName(slug, info.name) : slug;
  document.getElementById("detail-sub").textContent = info
    ? `最終更新 ${info.updated_at ?? "―"}`
    : "";

  const d = diffLabel(slug);
  const heroEl = document.getElementById("hero-stats");
  if (info) {
    heroEl.innerHTML = `
      <div class="hero-stat">
        <div class="label">本日の出勤</div>
        <div class="value num">${info.attendance ?? "―"}<span class="unit">人</span></div>
      </div>
      <div class="hero-stat">
        <div class="label">前日比</div>
        <div class="value num ${d.cls}" style="font-size:26px;">${d.text}</div>
      </div>
      <div class="hero-stat">
        <div class="label">新人(直近7日)</div>
        <div class="value num">${info.newface ?? "―"}<span class="unit">人</span></div>
      </div>
    `;
  } else {
    heroEl.innerHTML = "";
  }

  const { labels, datasets } = buildWeeklyOverlayDatasets(slug);
  const ctx = document.getElementById("storeChart");

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: "#7B8492", font: { size: 13 } } },
      },
      scales: {
        x: { ticks: { color: "#7B8492" }, grid: { color: "#1A1F28" } },
        y: { ticks: { color: "#7B8492" }, grid: { color: "#1A1F28" }, beginAtZero: true },
      },
    },
  });
}

async function init() {
  latestData = (await loadJSON(DATA_LATEST_URL)) || {};
  historyData = (await loadJSON(DATA_HISTORY_URL)) || {};

  if (Object.keys(latestData).length === 0) {
    document.getElementById("store-list").innerHTML =
      '<div class="empty-state">まだデータがありません。<br>Actionsの初回実行後に表示されます。</div>';
    return;
  }
  renderList();
  checkNotifications();
  const firstSlug = Object.keys(latestData)[0];
  selectStore(firstSlug);
}

init();

// PWA: Service Worker登録
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
</body>
</html>
